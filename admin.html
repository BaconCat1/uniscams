<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scammer List Admin</title>

<style>
body {
    font-family: Arial;
    background: #1e1e1e;
    color: white;
    padding: 20px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    background: #2d2d2d;
    color: white;
    border: 1px solid #444;
    border-radius: 6px;
    box-sizing: border-box;
}

button {
    padding: 10px;
    margin-top: 8px;
    cursor: pointer;
}

.section {
    background: #2a2a2a;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
}

pre {
    background: #111;
    padding: 10px;
    border-radius: 8px;
    max-height: 300px;
    overflow: auto;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<form autocomplete="off">

<div class="section">
    <h3>Import / Export</h3>

    <button type="button" onclick="clearFields()">
        Clear all fields
    </button>

    <input type="file"
        id="fileInput"
        accept=".json"
        autocomplete="off"
        spellcheck="false">

    <button type="button" onclick="downloadJSON()">
        Export data.json
    </button>
</div>

<div class="section">
    <h3>Main UUID</h3>

    <input id="uuidInput"
        placeholder="Minecraft UUID"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <button type="button" onclick="addUUID()">
        Add UUID
    </button>
</div>

<div class="section">
    <h3>Alt Mapping</h3>

    <input id="altChild"
        placeholder="ALT UUID"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <input id="altParent"
        placeholder="MAIN UUID"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <button type="button" onclick="addAlt()">
        Add Alt
    </button>
</div>

<div class="section">
    <h3>Discord Link</h3>

    <input id="discUser"
        placeholder="MAIN UUID"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <input id="discId"
        placeholder="DISCORD ID"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <button type="button" onclick="addDiscord()">
        Add Discord
    </button>
</div>

<div class="section">
    <h3>Server Tag</h3>

    <input id="tagUser"
        placeholder="UUID"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <select id="tagSelect">
        <option value="">Select server tag</option>
        <option value="unez">Unez Vanilla</option>
        <option value="sv">Simply Vanilla</option>
        <option value="axn">Anarchy Network</option>
        <option value="pv">Purity Vanilla</option>
        <option value="rv">Refined Vanilla</option>
    </select>

    <button type="button" onclick="addTag()">
        Add Tag
    </button>
</div>

<div class="section">
    <h3>Unlinked Player</h3>

    <input id="unlinkedName"
        placeholder="Main username"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <input id="unlinkedDiscord"
        placeholder="Discord ID"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <select id="unlinkedTagSelect">
        <option value="">Select server tag</option>
        <option value="unez">Unez Vanilla</option>
        <option value="sv">Simply Vanilla</option>
        <option value="axn">Anarchy Network</option>
        <option value="pv">Purity Vanilla</option>
        <option value="rv">Refined Vanilla</option>
    </select>

    <input id="unlinkedAltName"
        placeholder="Optional alt username"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="none">

    <input id="unlinkedNote"
        placeholder="Optional note"
        autocomplete="off"
        spellcheck="false">

    <button type="button" onclick="addUnlinked()">
        Add / Update Unlinked Player
    </button>
</div>

<div class="section">
    <h3>Current JSON</h3>
    <pre id="preview"></pre>
</div>

</form>

<script>
let data = {
    uuids: [],
    altMap: {},
    discordLinks: {},
    serverTags: {},
    manualAlts: {},
    unlinked: []
};

// shared main UUID state
let currentMainUUID = "";

// ---------------------
// LIVE MAIN UUID SYNC
// ---------------------
const uuidInput = document.getElementById("uuidInput");

uuidInput.addEventListener("input", (e) => {
    currentMainUUID = e.target.value.trim();

    document.getElementById("altParent").value = currentMainUUID;
    document.getElementById("discUser").value = currentMainUUID;
    document.getElementById("tagUser").value = currentMainUUID;
});

// ---------------------
function refresh() {
    document.getElementById("preview").textContent =
        JSON.stringify(data, null, 2);
}

// =====================
// IMPORT JSON
// =====================
document.getElementById("fileInput").addEventListener("change", (event) => {
    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = (e) => {
        try {
            data = JSON.parse(e.target.result);

            data.uuids ||= [];
            data.altMap ||= {};
            data.discordLinks ||= {};
            data.serverTags ||= {};
            data.manualAlts ||= {};
            data.unlinked ||= [];

            refresh();

            alert("Imported successfully");

        } catch (err) {
            alert("Invalid JSON file");
        }
    };

    reader.readAsText(file);
});

// =====================
// MAIN UUID
// =====================
function addUUID() {
    const v = uuidInput.value.trim();

    if (!v) return;

    currentMainUUID = v;

    if (!data.uuids.includes(v)) {
        data.uuids.push(v);
    }

    refresh();
}

// =====================
// ALT MAP
// =====================
function addAlt() {
    const child =
        document.getElementById("altChild").value.trim();

    const parent =
        document.getElementById("altParent").value.trim();

    if (!child || !parent) return;

    data.altMap[child] = parent;

    refresh();
}

// =====================
// DISCORD LINKS
// =====================
function addDiscord() {
    const uuid =
        document.getElementById("discUser").value.trim();

    const id =
        document.getElementById("discId").value.trim();

    if (!uuid || !id) return;

    if (!data.discordLinks[uuid]) {
        data.discordLinks[uuid] = [];
    }

    if (!data.discordLinks[uuid].includes(id)) {
        data.discordLinks[uuid].push(id);
    }

    refresh();
}

// =====================
// SERVER TAG CONFIG
// =====================
const tagConfig = {
    unez: {
        img: "unez.png",
        link: "https://discord.com/channels/1205807807862014002/1321524616262324277"
    },

    sv: {
        img: "sv.png",
        link: "https://discord.com/channels/773968029494935593/994485463186411550"
    },

    axn: {
        img: "axn.png",
        link: "https://discord.com/channels/1346555860033343570/1346562984385970176"
    },

    pv: {
        img: "pv.png",
        link: "https://discord.com/channels/854063411976732712/1493016959820894280"
    },

    rv: {
        img: "rv.png",
        link: "https://discord.com/channels/1400391816603504660/1400402121945383002"
    }
};

// =====================
// SERVER TAGS
// =====================
function addTag() {
    const uuid =
        document.getElementById("tagUser").value.trim();

    const key =
        document.getElementById("tagSelect").value;

    if (!uuid || !key) return;

    const tag = tagConfig[key];

    if (!tag) return;

    data.serverTags[uuid] = {
        img: tag.img,
        link: tag.link
    };

    refresh();
}

// =====================
// UNLINKED PLAYERS
// =====================
function addUnlinked() {
    const name =
        document.getElementById("unlinkedName").value.trim();

    const discordId =
        document.getElementById("unlinkedDiscord").value.trim();

    const key =
        document.getElementById("unlinkedTagSelect").value;

    const alt =
        document.getElementById("unlinkedAltName").value.trim();

    const note =
        document.getElementById("unlinkedNote").value.trim();

    if (!name) return;

    // find existing player
    let existing =
        data.unlinked.find(
            x => x.name.toLowerCase() === name.toLowerCase()
        );

    // create if missing
    if (!existing) {
        existing = {
            name: name,
            discordLinks: [],
            alts: []
        };

        data.unlinked.push(existing);
    }

    // discord links
    if (discordId) {
        if (!existing.discordLinks.includes(discordId)) {
            existing.discordLinks.push(discordId);
        }
    }

    // server tag
	if (key && tagConfig[key]) {
    existing.tags = [
        {
            img: tagConfig[key].img,
            link: tagConfig[key].link
        }
    ];
}

    // note
    if (note) {
        existing.note = note;
    }

    // alts
    if (alt) {
        const altExists =
            existing.alts.some(
                a => a.name.toLowerCase() === alt.toLowerCase()
            );

        if (!altExists) {
            existing.alts.push({
                name: alt
            });
        }
    }

    refresh();
}

// =====================
// EXPORT JSON
// =====================
function downloadJSON() {
    const blob = new Blob(
        [JSON.stringify(data, null, 2)],
        { type: "application/json" }
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "data.json";

    a.click();

    URL.revokeObjectURL(a.href);
}

// =====================
// CLEAR FORM
// =====================
function clearFields() {

    // clear normal inputs
    document.querySelectorAll("input").forEach(i => {

        if (i.type === "file") return;

        // preserve unlinked note
        if (i.id === "unlinkedNote") return;

        i.value = "";
    });

    // clear selects EXCEPT unlinked server tag
    document.querySelectorAll("select").forEach(sel => {

        if (sel.id === "unlinkedTagSelect") return;

        sel.selectedIndex = 0;
    });

    currentMainUUID = "";

    refresh();
}
refresh();
</script>

</body>
</html>
